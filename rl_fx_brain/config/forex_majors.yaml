# ---------------------------------------------------------------------------
# v3 FOREX_MAJORS config (7 major pairs only).
#
# EXPERIMENT: test whether training ONLY on the most liquid majors
# produces better generalization than the 28-pair shared forex brain.
# Hypothesis: majors have tighter spreads and cleaner price action, so
# a policy trained only on them should suffer less from the cross-
# contamination that hurt v2's shared forex brain.
# ---------------------------------------------------------------------------

universe:
  name: forex_majors
  instruments:
    - EUR_USD
    - GBP_USD
    - USD_JPY
    - USD_CHF
    - USD_CAD
    - AUD_USD
    - NZD_USD

data:
  granularity: H1
  secondary_granularity: null
  enable_secondary_tf: false
  price_type: M
  years_of_history: 9
  batch_count: 4500
  max_retries: 6
  retry_backoff_seconds: 2.0
  raw_dir: output/raw/forex          # reuses same parquets as full forex
  features_cache_dir: output/cache/forex_majors
  keep_raw_data: false

splits:
  train_frac: 0.72
  val_frac: 0.14
  test_frac: 0.14
  walk_forward_folds: 5

validation:
  embargo_bars: 100                   # purged gap between train and val

features:
  lookback: 96
  returns_horizons: [1, 3, 5, 10, 20]
  rolling_vol_window: 24
  atr_window: 14
  rsi_window: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  adx_window: 14
  ema_windows: [20, 50, 100, 200]
  bb_window: 20
  bb_std: 2.0
  cci_window: 20
  stoch_k: 14
  stoch_d: 3
  zscore_window: 50
  normalization: per_instrument

env:
  action_space: discrete_v1
  initial_balance: 10000.0
  risk_per_trade: 0.005
  max_position_units: 1
  max_leverage: 20.0
  max_drawdown_stop: 0.22
  use_realistic_costs: true
  off_session_cost_multiplier: true
  slippage_bp: 0.0
  spread_bp_default: 0.0
  overnight_penalty_bp: 0.2
  min_hold_bars: 6                    # 6 hours min hold (stricter than v2's 5)
  cooldown_bars: 4                    # 4 hours cooldown (stricter than v2's 3)
  inactivity_penalty: 0.0
  episode_length: 1024
  random_start: true

reward:
  w_realized_pnl: 2.0
  w_unrealized_pnl: 0.05
  w_transaction_cost: 6.0
  w_drawdown: 0.5
  w_overtrading: 2.5
  w_duration_penalty: 0.01
  w_risk_adjusted: 0.05
  w_clean_exit_bonus: 0.8

training:
  algorithm: PPO
  preset: production
  total_timesteps: 5_000_000          # shorter than full forex (7 majors is simpler)
  n_envs: 4
  seed: 2026
  policy: MlpPolicy
  policy_kwargs:
    net_arch: [256, 256, 128]         # smaller than 28-pair forex (7 syms needs less capacity)
  ppo:
    learning_rate: 2.0e-4
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.005
    vf_coef: 0.5
    max_grad_norm: 0.5
  eval_freq: 50000
  checkpoint_freq: 250000
  best_model_metric: stability_score
  secondary_metric: val_max_drawdown
  cluster_mode: shared
  resume_from: null
  lr_anneal: true

output:
  run_name: forex_majors
  models_dir: output/models/forex_majors
  checkpoints_dir: output/models/forex_majors/checkpoints
  brains_dir: output/brains/forex_majors
  reports_dir: output/reports/forex_majors
  metrics_dir: output/metrics
  tensorboard_dir: output/metrics/tensorboard/forex_majors
  dashboard_state_dir: output/dashboard/state

cleanup:
  delete_raw_data: false              # shared with full forex
  delete_features_cache: true
  delete_tensorboard_logs: false
  delete_checkpoints: true
  keep_sb3_zip: true
