# ---------------------------------------------------------------------------
# CORE_UNIVERSE training config.
# Majors + XAU_USD + XAG_USD only. 5 years of H1 candles.
# ---------------------------------------------------------------------------

universe:
  name: core
  instruments:
    - EUR_USD
    - GBP_USD
    - USD_JPY
    - USD_CHF
    - USD_CAD
    - AUD_USD
    - NZD_USD
    - XAU_USD
    - XAG_USD

data:
  # Primary training timeframe. Do not change without understanding impact.
  granularity: H1
  # Optional secondary timeframe merge. OFF by default.
  secondary_granularity: null      # set to "M15" to enable
  enable_secondary_tf: false
  # Price basis we consistently use for candles. "M" = mid.
  price_type: M
  # How many years of history to request.
  years_of_history: 5
  # Batch size per OANDA request (max 5000 per v20 spec).
  batch_count: 4500
  # Retries / backoff for the downloader.
  max_retries: 6
  retry_backoff_seconds: 2.0
  # Where raw parquet lands during training. Deleted by cleanup.py.
  raw_dir: output/raw/core
  features_cache_dir: output/cache/core
  keep_raw_data: false

splits:
  # Time-based split fractions. Strictly chronological. No leakage.
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15
  # Walk-forward evaluation windows used by evaluate.py.
  walk_forward_folds: 4

features:
  lookback: 64                     # bars per observation window
  returns_horizons: [1, 3, 5, 10]
  rolling_vol_window: 20
  atr_window: 14
  rsi_window: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  adx_window: 14
  ema_windows: [20, 50, 200]
  bb_window: 20
  bb_std: 2.0
  cci_window: 20
  stoch_k: 14
  stoch_d: 3
  zscore_window: 50
  normalization: standard          # standard | robust | minmax

env:
  action_space: discrete_v1        # discrete_v1 | target_position_v2
  initial_balance: 10000.0
  risk_per_trade: 0.01             # fraction of equity used as notional scaler
  max_position_units: 1            # one position per instrument
  max_leverage: 20.0
  max_drawdown_stop: 0.30          # episode terminates beyond this drawdown
  slippage_bp: 0.5                 # extra cost beyond spread (basis points)
  spread_bp_default: 1.5           # used when real spread not available
  overnight_penalty_bp: 0.1
  inactivity_penalty: 0.0          # 0 disables
  episode_length: 1024             # max steps per training episode
  random_start: true

reward:
  # Tuned for forex: cost + overtrading penalties dominate because
  # shared-policy PPO on H1 overtrades FX pairs by default.
  w_realized_pnl: 2.0
  w_unrealized_pnl: 0.05
  w_transaction_cost: 5.0
  w_drawdown: 0.3
  w_overtrading: 2.0
  w_duration_penalty: 0.02
  w_risk_adjusted: 0.05
  w_clean_exit_bonus: 0.5

training:
  algorithm: PPO
  total_timesteps: 1_500_000
  n_envs: 4
  seed: 42
  policy: MlpPolicy
  policy_kwargs:
    net_arch: [256, 256]
  ppo:
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
  eval_freq: 25000
  checkpoint_freq: 50000
  best_model_metric: val_sharpe    # primary
  secondary_metric: val_max_drawdown
  cluster_mode: shared             # shared | shared_forex_separate_metals | per_cluster

output:
  run_name: core
  models_dir: output/models/core
  checkpoints_dir: output/models/core/checkpoints
  brains_dir: output/brains/core
  reports_dir: output/reports/core
  metrics_dir: output/metrics
  tensorboard_dir: output/metrics/tensorboard/core
  dashboard_state_dir: output/dashboard/state

cleanup:
  delete_raw_data: true
  delete_features_cache: true
  delete_tensorboard_logs: false
  delete_checkpoints: true
  keep_sb3_zip: true
