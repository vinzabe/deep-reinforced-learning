# ---------------------------------------------------------------------------
# v2 METALS config (XAU_USD, XAG_USD only).
#
# Rationale: v1 evaluation showed metals were the only profitable slice
# under a shared policy. Separating metals into their own brain lets us:
#   - use metal-specific normalization (gold and silver have absolute
#     prices that are 1000x the range of FX majors)
#   - use metal-specific reward weights (bigger pip moves per bar, so
#     the cost-to-signal ratio is different)
#   - train for more steps (10M target) since the universe is small and
#     convergence is fast
# ---------------------------------------------------------------------------

universe:
  name: metals
  instruments:
    - XAU_USD
    - XAG_USD

data:
  granularity: H1
  secondary_granularity: null
  enable_secondary_tf: false
  price_type: M
  years_of_history: 7             # longer history fits easily for 2 symbols
  batch_count: 4500
  max_retries: 6
  retry_backoff_seconds: 2.0
  raw_dir: output/raw/metals
  features_cache_dir: output/cache/metals
  keep_raw_data: false

splits:
  train_frac: 0.72
  val_frac: 0.14
  test_frac: 0.14
  walk_forward_folds: 5

features:
  lookback: 96                    # longer lookback than v1: metals respect
                                  # longer-term trend structure well.
  returns_horizons: [1, 3, 5, 10, 20]
  rolling_vol_window: 24
  atr_window: 14
  rsi_window: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  adx_window: 14
  ema_windows: [20, 50, 100, 200]
  bb_window: 20
  bb_std: 2.0
  cci_window: 20
  stoch_k: 14
  stoch_d: 3
  zscore_window: 50
  normalization: per_instrument   # per-symbol fit instead of global, so
                                  # XAU's large absolute prices don't
                                  # dominate XAG's.

env:
  action_space: discrete_v1
  initial_balance: 10000.0
  risk_per_trade: 0.01
  max_position_units: 1
  max_leverage: 10.0
  max_drawdown_stop: 0.25
  use_realistic_costs: true       # pull from universe.INSTRUMENT_COST_TABLE
  off_session_cost_multiplier: true
  slippage_bp: 0.0                # baked into per-instrument table
  spread_bp_default: 0.0
  overnight_penalty_bp: 0.15
  min_hold_bars: 4                # NEW: prevents ping-ponging entries
  cooldown_bars: 2                # NEW: bars to wait after closing a trade
  inactivity_penalty: 0.0
  episode_length: 1024
  random_start: true

reward:
  # Matched to v1 metals-friendly shape: strong cost penalty + cleaner
  # exit bonus because metals reward patient trend-following.
  w_realized_pnl: 2.5
  w_unrealized_pnl: 0.05
  w_transaction_cost: 4.0
  w_drawdown: 0.4
  w_overtrading: 1.5
  w_duration_penalty: 0.02
  w_risk_adjusted: 0.05
  w_clean_exit_bonus: 1.0

training:
  algorithm: PPO
  preset: production              # smoke | standard | production
  total_timesteps: 10_000_000     # production target
  n_envs: 4
  seed: 2026
  policy: MlpPolicy
  policy_kwargs:
    net_arch: [256, 256, 128]
  ppo:
    learning_rate: 2.5e-4
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.005
    vf_coef: 0.5
    max_grad_norm: 0.5
  eval_freq: 50000
  checkpoint_freq: 250000
  best_model_metric: val_sharpe
  secondary_metric: val_max_drawdown
  cluster_mode: shared            # within metals there are only 2 syms
  resume_from: null               # set to a .zip path to warm-start
  lr_anneal: true                 # linear anneal to 0 in final 20%

output:
  run_name: metals
  models_dir: output/models/metals
  checkpoints_dir: output/models/metals/checkpoints
  brains_dir: output/brains/metals
  reports_dir: output/reports/metals
  metrics_dir: output/metrics
  tensorboard_dir: output/metrics/tensorboard/metals
  dashboard_state_dir: output/dashboard/state

cleanup:
  delete_raw_data: true
  delete_features_cache: true
  delete_tensorboard_logs: false
  delete_checkpoints: true
  keep_sb3_zip: true
