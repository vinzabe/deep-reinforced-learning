# ---------------------------------------------------------------------------
# FULL_UNIVERSE training config.
# All majors, major crosses, XAU_USD, XAG_USD. 8-10 years of H1 candles.
# ---------------------------------------------------------------------------

universe:
  name: full
  instruments:
    # Majors
    - EUR_USD
    - GBP_USD
    - USD_JPY
    - USD_CHF
    - USD_CAD
    - AUD_USD
    - NZD_USD
    # EUR crosses
    - EUR_GBP
    - EUR_JPY
    - EUR_CHF
    - EUR_CAD
    - EUR_AUD
    - EUR_NZD
    # GBP crosses
    - GBP_JPY
    - GBP_CHF
    - GBP_CAD
    - GBP_AUD
    - GBP_NZD
    # JPY crosses
    - AUD_JPY
    - CAD_JPY
    - CHF_JPY
    - NZD_JPY
    # Commodity / cross-minor
    - AUD_CAD
    - AUD_CHF
    - AUD_NZD
    - NZD_CAD
    - NZD_CHF
    - CAD_CHF
    # Metals
    - XAU_USD
    - XAG_USD

data:
  granularity: H1
  secondary_granularity: null
  enable_secondary_tf: false
  price_type: M
  years_of_history: 9              # 8-10 year window, centered at 9
  batch_count: 4500
  max_retries: 6
  retry_backoff_seconds: 2.0
  raw_dir: output/raw/full
  features_cache_dir: output/cache/full
  keep_raw_data: false

splits:
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15
  walk_forward_folds: 4

features:
  lookback: 64
  returns_horizons: [1, 3, 5, 10]
  rolling_vol_window: 20
  atr_window: 14
  rsi_window: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  adx_window: 14
  ema_windows: [20, 50, 200]
  bb_window: 20
  bb_std: 2.0
  cci_window: 20
  stoch_k: 14
  stoch_d: 3
  zscore_window: 50
  normalization: standard

env:
  action_space: discrete_v1
  initial_balance: 10000.0
  risk_per_trade: 0.01
  max_position_units: 1
  max_leverage: 20.0
  max_drawdown_stop: 0.30
  slippage_bp: 0.5
  spread_bp_default: 1.5
  overnight_penalty_bp: 0.1
  inactivity_penalty: 0.0
  episode_length: 1024
  random_start: true

reward:
  # Matched to core: aggressive penalty on cost + overtrading.
  w_realized_pnl: 2.0
  w_unrealized_pnl: 0.05
  w_transaction_cost: 5.0
  w_drawdown: 0.3
  w_overtrading: 2.0
  w_duration_penalty: 0.02
  w_risk_adjusted: 0.05
  w_clean_exit_bonus: 0.5

training:
  algorithm: PPO
  total_timesteps: 3_000_000       # larger universe -> more steps
  n_envs: 4
  seed: 42
  policy: MlpPolicy
  policy_kwargs:
    net_arch: [256, 256]
  ppo:
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
  eval_freq: 50000
  checkpoint_freq: 100000
  best_model_metric: val_sharpe
  secondary_metric: val_max_drawdown
  cluster_mode: shared

output:
  run_name: full
  models_dir: output/models/full
  checkpoints_dir: output/models/full/checkpoints
  brains_dir: output/brains/full
  reports_dir: output/reports/full
  metrics_dir: output/metrics
  tensorboard_dir: output/metrics/tensorboard/full
  dashboard_state_dir: output/dashboard/state

cleanup:
  delete_raw_data: true
  delete_features_cache: true
  delete_tensorboard_logs: false
  delete_checkpoints: true
  keep_sb3_zip: true
