universe:
  name: forex_v4
  instruments:
    - EUR_USD
    - GBP_USD
    - USD_JPY
    - USD_CHF
    - USD_CAD
    - AUD_USD
    - NZD_USD
    - EUR_GBP
    - EUR_JPY
    - EUR_CHF
    - EUR_CAD
    - EUR_AUD
    - EUR_NZD
    - GBP_JPY
    - GBP_CHF
    - GBP_CAD
    - GBP_AUD
    - GBP_NZD
    - AUD_JPY
    - CAD_JPY
    - CHF_JPY
    - NZD_JPY
    - AUD_CAD
    - AUD_CHF
    - AUD_NZD
    - NZD_CAD
    - NZD_CHF
    - CAD_CHF

data:
  granularity: H1
  secondary_granularity: null
  enable_secondary_tf: false
  price_type: M
  years_of_history: 9
  batch_count: 4500
  max_retries: 6
  retry_backoff_seconds: 2.0
  raw_dir: output/raw/forex
  features_cache_dir: output/cache/forex_v4
  keep_raw_data: false

splits:
  train_frac: 0.72
  val_frac: 0.14
  test_frac: 0.14
  walk_forward_folds: 5

validation:
  embargo_bars: 200
  n_walk_forward_folds: 5

features:
  lookback: 96
  returns_horizons: [1, 3, 5, 10, 20]
  rolling_vol_window: 24
  atr_window: 14
  rsi_window: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  adx_window: 14
  ema_windows: [20, 50, 100, 200]
  bb_window: 20
  bb_std: 2.0
  cci_window: 20
  stoch_k: 14
  stoch_d: 3
  zscore_window: 50
  normalization: per_instrument

env:
  action_space: discrete_v1
  initial_balance: 10000.0
  risk_per_trade: 0.005
  max_position_units: 1
  max_leverage: 20.0
  max_drawdown_stop: 0.20
  use_realistic_costs: true
  off_session_cost_multiplier: true
  slippage_bp: 0.0
  spread_bp_default: 0.0
  overnight_penalty_bp: 0.2
  min_hold_bars: 8
  cooldown_bars: 5
  inactivity_penalty: 0.0
  episode_length: 1024
  random_start: true

reward:
  w_realized_pnl: 2.0
  w_unrealized_pnl: 0.05
  w_transaction_cost: 10.0
  w_drawdown: 0.5
  w_overtrading: 3.0
  w_duration_penalty: 0.02
  w_risk_adjusted: 0.05
  w_clean_exit_bonus: 0.8
  w_loss_asymmetry: 0.5
  min_breakout_atr: 2.0
  w_session_alignment: 0.05
  session_aware_entry: true
  overtrading_daily_budget: 1
  duration_penalty_min_bars: 20

training:
  algorithm: PPO
  preset: production
  total_timesteps: 500000
  n_envs: 2
  seed: 2026
  policy: MlpPolicy
  policy_kwargs:
    net_arch: [256, 256, 128]
  ppo:
    learning_rate: 1.5e-4
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.15
    ent_coef: 0.002
    vf_coef: 0.5
    max_grad_norm: 0.5
  eval_freq: 100000
  checkpoint_freq: 250000
  best_model_metric: stability_score
  secondary_metric: val_max_drawdown
  early_stop_patience: 20
  cluster_mode: shared
  resume_from: null
  lr_anneal: true

output:
  run_name: forex_v4
  models_dir: output/models/forex_v4
  checkpoints_dir: output/models/forex_v4/checkpoints
  brains_dir: output/brains/forex_v4
  reports_dir: output/reports/forex_v4
  metrics_dir: output/metrics
  tensorboard_dir: output/metrics/tensorboard/forex_v4
  dashboard_state_dir: output/dashboard/state

cleanup:
  delete_raw_data: false
  delete_features_cache: true
  delete_tensorboard_logs: false
  delete_checkpoints: true
  keep_sb3_zip: true
